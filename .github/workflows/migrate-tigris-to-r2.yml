name: Migrate Tigris to R2

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (list actions without copying)"
        type: boolean
        default: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        env:
          TIGRIS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          TIGRIS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [tigris]
          type = s3
          provider = Other
          access_key_id = ${TIGRIS_ACCESS_KEY_ID}
          secret_access_key = ${TIGRIS_SECRET_ACCESS_KEY}
          endpoint = https://t3.storage.dev
          region = auto

          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY_ID}
          secret_access_key = ${R2_SECRET_ACCESS_KEY}
          endpoint = https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com
          region = auto
          EOF

      - name: Copy Tigris to R2
        run: |
          FLAGS="--progress --metadata --checksum"
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
            echo "DRY RUN — no objects will be copied"
          fi
          rclone sync tigris:widgets r2:widgets $FLAGS

      - name: List R2 bucket contents
        if: ${{ !inputs.dry-run }}
        run: rclone lsf r2:widgets --recursive --max-depth 2
